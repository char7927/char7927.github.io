<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>18</title>
    <style>
      #webcam, #canvas {
        top:0;
        left: 0;
      }
    </style>
  </head>
  <body>
    <div>
      <video id="webcam" autoplay="true" width="100%" height="100%" style="position: absolute;"></video>
      <canvas id="canvas" style="position: absolute; background-color:rgba(255, 0, 0, 0.5);"></canvas>
      <label for="mobile-camera" class="ui-button">Choose Photo</label>
      <input type="file" id="mobile-camera" accept="image/*" style="display: none;">
      <div class="viewport">
        <img id="output" width="100%" title="Your image" />
      </div>
    </div>
  </body>
  <script>
    const video = document.getElementById("webcam");
    const constraints = {video: {facingMode: "environment"}};
    if(!!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia)) {
      navigator.mediaDevices.getUserMedia(constraints).then((stream) => {
        video.srcObject = stream;
        video.onloadedmetadata = () => {
          canvas.width = video.offsetWidth;//videoWidth;
          canvas.height = video.offsetHeight;//videoHeight;
        };
      });
    }else{
      alert('false');
    }
    const input = document.getElementById("mobile-camera");
    const output = document.getElementById('output');
    input.addEventListener('change', (event) => {
      const file = event.target.files[0];
      if(file) {
        const tempUrl = URL.createObjectURL(file);
        output.src = tempUrl;
        output.onload = () => {
          URL.revokeObjectURL(tempUrl);
        };
      }
    });
  </script>
</html>
