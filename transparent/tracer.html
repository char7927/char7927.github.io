<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>20</title>
    <style>
      #webcam, #canvas {
        top:0;
        left: 0;
        z-index: -1;
      }
    </style>
  </head>
  <body>
    <div>
      <video id="webcam" autoplay="true" width="100%" height="100%" style="position: absolute;"></video>
      <!--<canvas id="canvas" style="position: absolute; background-color:rgba(255, 0, 0, 0.5);"></canvas>-->
      <label for="mobile-camera" class="ui-button">Choose Photo</label>
      <input type="file" id="mobile-camera" accept="image/*">
      <div class="viewport">
        <img id="output" width="100%" height="100%" title="Your image" style="opacity: 0.5" />
      </div>
    </div>
  </body>
  <script>
    //https://www.dynamsoft.com/codepool/camera-focus-control-on-web.html
    const video = document.getElementById("webcam");
    const constraints = {video: {facingMode: "environment"}};
    if(!!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia)) {
      navigator.mediaDevices.getUserMedia(constraints).then((stream) => {
        video.srcObject = stream;
      });
    }else{
      alert('false');
    }
    const input = document.getElementById("mobile-camera");
    const output = document.getElementById('output');
    input.addEventListener('change', (event) => {
      const file = event.target.files[0];
      if(file) {
        const tempUrl = URL.createObjectURL(file);
        output.src = tempUrl;
        output.onload = () => {
          URL.revokeObjectURL(tempUrl);
        };
      }
    });
  </script>
</html>
